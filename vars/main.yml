---
downloads: ~/.ansible-downloads/

configure_sudoers: yes

dotfiles_repo: https://github.com/breiting/dotfiles.git
dotfiles_repo_local_destination: ~/dotfiles
dotfiles_files:
  - .bash_profile
  - .gitconfig
  - .gitignore
  - .inputrc
  - .osx
  - .vimrc

homebrew_installed_packages:
  - ack
  - ansible
  - astyle
  - autoconf
  - brew-cask
  - clang-format
  - cmake
  - cppcheck
  - ctags
  - curl
  - docker
  - docker-compose
  - docker-machine
  - ffmpeg
  - fontconfig
  - freeglut
  - freetype
  - git
  - gnu-sed
  - graphviz
  - gpg
  - grep
  - imagemagick
  - lcov
  - libusb
  - libxml2
  - libyaml
  - mosquitto
  - nmap
  - opencv
  - openssl
  - pandoc
  - python
  - qt
  - rbenv
  - tmux
  - tree
  - vim
  - wget

homebrew_taps:
  - caskroom/cask
  - homebrew/binary
  - homebrew/dupes
  - homebrew/php
  - homebrew/versions

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
  - adium
  - bettertouchtool
  - google-chrome
  - dropbox
  - fing
  - firefox
  - handbrake
  - karabiner
  - limechat
  - licecap
  - macvim
  - menumeters
  - nvalt
  - sequel-pro
  - skype
  - skitch
  - seil
  - sublime-text # Note - Sublime Text 2 only, at this time...
  - textmate
  - timemachineeditor
  - tower
  - transmit
  - vagrant
  - vagrant-manager
  - vlc
  - virtualbox
